name: CI

on:
    pull_request:

jobs:
    build:
        name: Docker build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v2
              
            - name: Pull images
              run: docker-compose pull
              
            - name: Start services
              run: docker-compose up --build -d
              
            - name: Start PostgreSQL
              run: |
                sudo systemctl start postgresql.service
                pg_isready
                sudo -u postgres psql -c "create ${DB_USER} odm WITH PASSWORD '${DB_PPWD}';"
                sudo -u postgres psql -c "create database ${DB_USER} OWNER ${DB_NAME};"
              
            - name: Checkout
              uses: actions/checkout@v2
              
            - name: Get composer cache directory
              id: composer-cache
              run: echo "::set-output name=dir::$(composer config cache-files-dir)"
              
            - name: Cache dependencies
              uses: actions/cache@v2
              with:
                path: ${{ steps.composer-cache.outputs.dir }}
                key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}-8.0-
                restore-keys: ${{ runner.os }}-composer-8.0-
              
            - name: Wait for services
              run: |
                  while status="$(docker inspect --format="{{if .Config.Healthcheck}}{{print .State.Health.Status}}{{end}}" "$(docker-compose ps -q php)")"; do
                    case $status in
                      starting) sleep 1;;
                      healthy) exit 0;;
                      unhealthy) exit 1;;
                    esac
                  done
                  exit 1
                
            - name: Check HTTP reachability
              run: curl http://localhost
              
            - name: Check HTTPS reachability
              run: curl -k https://localhost
